<div class="post-sharing">
    <div class="sharing-title">Share this post</div>
    <div class="sharing-links">
        <a
            href="https://x.com/intent/tweet?url={{ .Page.URL }}&text={{ .Page.Config.title }}"
            target="_blank"
            rel="noopener noreferrer"
            title="Share on X"
        >
            <i class="fab fa-x-twitter"></i>
        </a>
        <a
            href="https://news.ycombinator.com/submitlink?u={{ .Page.URL }}&t={{ .Page.Config.title }}"
            target="_blank"
            rel="noopener noreferrer"
            title="Share on Hacker News"
        >
            <i class="fab fa-hacker-news"></i>
        </a>
        <a
            href="https://www.reddit.com/submit?url={{ .Page.URL }}&title={{ .Page.Config.title }}"
            target="_blank"
            rel="noopener noreferrer"
            title="Share on Reddit"
        >
            <i class="fab fa-reddit-alien"></i>
        </a>
        <a
            href="https://www.linkedin.com/shareArticle?mini=true&url={{ .Page.URL }}&title={{ .Page.Config.title }}"
            target="_blank"
            rel="noopener noreferrer"
            title="Share on LinkedIn"
        >
            <i class="fab fa-linkedin-in"></i>
        </a>
        <a
            href="https://mastodon.social/share?url={{ .Page.URL }}&text={{ .Page.Config.title }}"
            target="_blank"
            rel="noopener noreferrer"
            title="Share on Mastodon"
        >
            <i class="fab fa-mastodon"></i>
        </a>
        <a href="mailto:?subject={{ .Page.Config.title }}&body={{ .Page.URL }}" title="Share via Email">
            <i class="fas fa-envelope"></i>
        </a>
    </div>
</div>
