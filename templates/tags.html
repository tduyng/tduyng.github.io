<!doctype html>
<html lang="{{ priority .Page.Config.lang .Section.Config.lang .Site.Config.lang }}">
    {{ template "partials/_head.html" . }}
    <body class="tag-list">
        {{ template "partials/_sidebar.html" . }}
        
        <div id="main-wrapper">
            <main id="main-content">
                <div class="main-header">
                    <button type="button" id="sidebar-trigger" aria-label="Sidebar">
                        <i class="fas fa-bars fa-fw"></i>
                    </button>
                    <div id="breadcrumb">
                        <a href="/">Home</a>
                        <span>Tags</span>
                    </div>
                    <div id="search-wrapper">
                        <i class="fas fa-search fa-fw"></i>
                        <input id="search-input" type="search" placeholder="Search...">
                        <div id="search-results"></div>
                    </div>
                </div>
                <div class="container">
                    <div class="title">
                        <h1>Tags</h1>
                    </div>
                    <div class="tags-cloud">
                        {{ range .Page.Terms }}
                        <a class="instant post-tag" href="{{ .Permalink }}" data-count="{{ .Count }}">
                            # {{ .Name }} <span>({{ .Count }})</span>
                        </a>
                        {{ end }}
                    </div>
                </div>
            </main>
            
            <aside id="right-panel">
                <div class="panel-wrapper">
                    {{ template "partials/_panel.html" . }}
                </div>
            </aside>
        </div>

        {{ template "partials/_footer.html" . }}
        <div id="mask"></div>
        {{ template "partials/_scripts.html" . }}
    </body>
</html>
