base_url = "https://tduyng.com"
feed_url = "https://tduyng.com/atom.xml"
title = "Duy NG"
description = "Backend Engineer. Building fast, reliable systems. Always learning."
language = "en"
output_dir = "public"
generate_feed = true
generate_search = true
minify_css = true
minify_html = true
minify_js = true

# Auto-generate summaries from first N sentences (when description is not provided)
summary_length = 2

#=========================================================================================
[extra]
name = "Duy NG"
id = "tduyng"
bio = "Backend Engineer • Always learning, never stop exploring"
avatar = "/img/avatar.webp"
img = "/img/post-cover.webp"
links = [
  { name = "GitHub", icon = "github", url = "https://github.com/tduyng" },
  { name = "X", icon = "x", url = "https://x.com/tduyng" },
  { name = "Email", icon = "email", url = "mailto:hi@tduyng.com" },
]

# Sidebar navigation - defines all links shown in sidebar
sidebar = [
  { name = "home", path = "/", icon = "home", text = "HOME" },
  { name = "blog", path = "/blog", icon = "pencil-alt", text = "BLOG" },
  { name = "notes", path = "/notes", icon = "sticky-note", text = "NOTES" },
  { name = "uses", path = "/uses", icon = "laptop-code", text = "USES" },
  { name = "archive", path = "/archive", icon = "archive", text = "ARCHIVES" },
  { name = "tags", path = "/tags", icon = "tags", text = "TAGS" },
  { name = "series", path = "/series", icon = "stream", text = "SERIES" },
  { name = "about", path = "/about", icon = "user", text = "ABOUT" },
  { name = "contact", path = "/contact", icon = "envelope", text = "CONTACT" },
  { name = "privacy", path = "/privacy", icon = "shield-alt", text = "PRIVACY" },
]

ended_words = "Thanks for reading! If you notice anything outdated or have suggestions for improvements, you can suggest edits below or leave a comment."
reaction_align = "right"                                                                                                                                  # "left" | "center" | "right"
reaction_endpoint = "https://reaction.tienduy-nguyen-dev.workers.dev"
outdate_alert_text_before = "This article was last updated "
outdate_alert_text_after = " days ago and may be out of date."
recent_more_text = "View All Posts"
enable_analytics = true

# Homepage bento cards configuration
[[extra.bento_cards]]
type = "stack"
icon = "🛠️"
title = "Stack"
tags = ["TypeScript", "Go", "Rust", "Node.js", "Docker", "Kubernetes", "AWS"]

[[extra.bento_cards]]
type = "now"
icon = "⏰"
title = "Now"
lines = [
  { prompt = "$", text = "building", link = "https://github.com/tduyng/gozzi", link_text = "gozzi" },
  { prompt = ">", text = "writing neovim series" },
  { prompt = ">", text = "exploring terminal tools" },
]

[[extra.bento_cards]]
type = "focus"
icon = "🎯"
title = "Focus"
lines = [
  { prompt = ">", text = "neovim + nix" },
  { prompt = ">", text = "terminal first" },
  { prompt = ">", text = "keyboard centric" },
]

# Taxonomy configuration
[taxonomies]
tags = { enabled = true, paginate_by = 0 }
series = { enabled = true, paginate_by = 0 }
